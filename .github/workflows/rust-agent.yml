name: Rust Agent

on:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/rust-agent.yml"
  pull_request:
    branches: [main]
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build --release -p nexterm-agent

      - name: Test (unit + integration)
        run: cargo test --all

      - name: Binary size
        shell: bash
        run: |
          if [ -f target/release/nexterm-agent.exe ]; then
            ls -lh target/release/nexterm-agent.exe
          else
            ls -lh target/release/nexterm-agent
          fi

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: nexterm-agent-${{ matrix.os }}
          path: |
            target/release/nexterm-agent
            target/release/nexterm-agent.exe
          if-no-files-found: ignore
          retention-days: 7
