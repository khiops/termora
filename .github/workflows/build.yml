name: Build

on:
  workflow_call:

jobs:
  # Build the web UI once (architecture-independent)
  build-web:
    name: Build Web UI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm -F @nexterm/shared build

      - name: Build web UI
        run: pnpm -F @nexterm/web build

      - name: Embed web UI into hub static/
        run: node scripts/embed-web.js

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-static
          path: packages/hub/static/
          retention-days: 1

  # Build SEA binaries for each target platform
  build-sea:
    name: Build SEA (${{ matrix.target_os }}-${{ matrix.target_arch }})
    needs: build-web

    strategy:
      fail-fast: false
      matrix:
        include:
          - target_os: linux
            target_arch: x64
            runner: ubuntu-latest
          - target_os: windows
            target_arch: x64
            runner: windows-latest

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages (excluding desktop)
        run: pnpm -F @nexterm/shared -F @nexterm/agent -F @nexterm/hub build

      - name: Download web artifact
        uses: actions/download-artifact@v4
        with:
          name: web-static
          path: packages/hub/static/

      - name: Build and package agent SEA
        run: pnpm run package:sea-agent

      - name: Build and package hub SEA
        run: pnpm run package:sea-hub

      - name: Rename agent binary (Unix)
        if: matrix.target_os != 'windows'
        env:
          TARGET_OS: ${{ matrix.target_os }}
          TARGET_ARCH: ${{ matrix.target_arch }}
        run: mv dist/sea/nexterm-agent dist/sea/nexterm-agent-${TARGET_OS}-${TARGET_ARCH}

      - name: Rename hub binary (Unix)
        if: matrix.target_os != 'windows'
        env:
          TARGET_OS: ${{ matrix.target_os }}
          TARGET_ARCH: ${{ matrix.target_arch }}
        run: mv dist/sea/nexterm-hub dist/sea/nexterm-hub-${TARGET_OS}-${TARGET_ARCH}

      - name: Rename agent binary (Windows)
        if: matrix.target_os == 'windows'
        env:
          TARGET_OS: ${{ matrix.target_os }}
          TARGET_ARCH: ${{ matrix.target_arch }}
        run: Move-Item dist/sea/nexterm-agent.exe dist/sea/nexterm-agent-$env:TARGET_OS-$env:TARGET_ARCH.exe
        shell: pwsh

      - name: Rename hub binary (Windows)
        if: matrix.target_os == 'windows'
        env:
          TARGET_OS: ${{ matrix.target_os }}
          TARGET_ARCH: ${{ matrix.target_arch }}
        run: Move-Item dist/sea/nexterm-hub.exe dist/sea/nexterm-hub-$env:TARGET_OS-$env:TARGET_ARCH.exe
        shell: pwsh

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: sea-${{ matrix.target_os }}-${{ matrix.target_arch }}
          path: |
            dist/sea/nexterm-agent-${{ matrix.target_os }}-${{ matrix.target_arch }}*
            dist/sea/nexterm-hub-${{ matrix.target_os }}-${{ matrix.target_arch }}*
          retention-days: 7

  # Build Tauri desktop installer (Windows only for now)
  build-tauri:
    name: Build Tauri Desktop
    needs: build-sea
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/clients/desktop/src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download SEA artifact
        uses: actions/download-artifact@v4
        with:
          name: sea-windows-x64
          path: sea-artifacts/

      - name: Place sidecar binaries
        run: |
          Copy-Item sea-artifacts/nexterm-hub-windows-x64.exe `
            packages/clients/desktop/src-tauri/nexterm-hub-x86_64-pc-windows-msvc.exe
          Copy-Item sea-artifacts/nexterm-agent-windows-x64.exe `
            packages/clients/desktop/src-tauri/nexterm-agent-x86_64-pc-windows-msvc.exe
        shell: pwsh

      - name: Build shared package
        run: pnpm -F @nexterm/shared build

      - name: Build web UI
        run: pnpm -F @nexterm/web build

      - name: Build Tauri app
        env:
          TAURI_CONFIG: '{"build":{"beforeBuildCommand":""}}'
        run: pnpm -F @nexterm/desktop exec tauri build

      - name: Upload Tauri installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-windows-x64
          path: |
            packages/clients/desktop/src-tauri/target/release/bundle/**/*.msi
            packages/clients/desktop/src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 7
