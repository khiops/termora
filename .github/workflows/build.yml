name: Build

on:
  workflow_call:

jobs:
  # Build the web UI once (architecture-independent)
  build-web:
    name: Build Web UI
    # Use windows-latest as fallback — ubuntu runners have periodic outages.
    # This job is ~30s so the 2x Windows cost multiplier is negligible.
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm -F @nexterm/shared build

      - name: Build web UI
        run: pnpm -F @nexterm/web build

      - name: Embed web UI into hub static/
        run: node scripts/embed-web.js

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-static
          path: packages/hub/static/
          retention-days: 1

  # Build SEA binaries for each target platform
  build-sea:
    name: Build SEA
    needs: build-web

    strategy:
      fail-fast: false
      matrix:
        include:
          - target_os: linux
            target_arch: x64
            runner: ubuntu-latest
          - target_os: linux
            target_arch: arm64
            runner: ubuntu-24.04-arm
          - target_os: windows
            target_arch: x64
            runner: windows-latest
          # - target_os: darwin
          #   target_arch: arm64
          #   runner: macos-latest

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages (excluding desktop)
        run: pnpm -F @nexterm/shared -F @nexterm/agent -F @nexterm/hub build

      - name: Download web artifact
        uses: actions/download-artifact@v4
        with:
          name: web-static
          path: packages/hub/static/

      - name: Build and package agent SEA
        run: pnpm run package:sea-agent

      - name: Build and package hub SEA
        run: pnpm run package:sea-hub

      - name: Rename agent binary (Unix)
        if: matrix.target_os != 'windows'
        env:
          TARGET_OS: ${{ matrix.target_os }}
          TARGET_ARCH: ${{ matrix.target_arch }}
        run: mv dist/sea/nexterm-agent dist/sea/nexterm-agent-${TARGET_OS}-${TARGET_ARCH}

      - name: Rename hub binary (Unix)
        if: matrix.target_os != 'windows'
        env:
          TARGET_OS: ${{ matrix.target_os }}
          TARGET_ARCH: ${{ matrix.target_arch }}
        run: mv dist/sea/nexterm-hub dist/sea/nexterm-hub-${TARGET_OS}-${TARGET_ARCH}

      - name: Rename agent binary (Windows)
        if: matrix.target_os == 'windows'
        env:
          TARGET_OS: ${{ matrix.target_os }}
          TARGET_ARCH: ${{ matrix.target_arch }}
        run: Move-Item dist/sea/nexterm-agent.exe dist/sea/nexterm-agent-$env:TARGET_OS-$env:TARGET_ARCH.exe
        shell: pwsh

      - name: Rename hub binary (Windows)
        if: matrix.target_os == 'windows'
        env:
          TARGET_OS: ${{ matrix.target_os }}
          TARGET_ARCH: ${{ matrix.target_arch }}
        run: Move-Item dist/sea/nexterm-hub.exe dist/sea/nexterm-hub-$env:TARGET_OS-$env:TARGET_ARCH.exe
        shell: pwsh

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: sea-${{ matrix.target_os }}-${{ matrix.target_arch }}
          path: |
            dist/sea/nexterm-agent-${{ matrix.target_os }}-${{ matrix.target_arch }}*
            dist/sea/nexterm-hub-${{ matrix.target_os }}-${{ matrix.target_arch }}*
          retention-days: 7

  # Build Tauri desktop installers for each platform
  build-tauri:
    name: Build Tauri Desktop
    needs: build-sea

    strategy:
      fail-fast: false
      matrix:
        include:
          - target_os: linux
            target_arch: x64
            runner: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
          - target_os: linux
            target_arch: arm64
            runner: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-gnu
          - target_os: windows
            target_arch: x64
            runner: windows-latest
            rust_target: x86_64-pc-windows-msvc
          # - target_os: darwin
          #   target_arch: arm64
          #   runner: macos-latest
          #   rust_target: aarch64-apple-darwin

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/clients/desktop/src-tauri

      - name: Install Linux system deps
        if: matrix.target_os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download SEA artifact
        uses: actions/download-artifact@v4
        with:
          name: sea-${{ matrix.target_os }}-${{ matrix.target_arch }}
          path: sea-artifacts/

      - name: Place sidecar binaries (Unix)
        if: matrix.target_os != 'windows'
        run: |
          cp sea-artifacts/nexterm-hub-${{ matrix.target_os }}-${{ matrix.target_arch }} \
            packages/clients/desktop/src-tauri/nexterm-hub-${{ matrix.rust_target }}
          chmod +x packages/clients/desktop/src-tauri/nexterm-hub-${{ matrix.rust_target }}
          cp sea-artifacts/nexterm-agent-${{ matrix.target_os }}-${{ matrix.target_arch }} \
            packages/clients/desktop/src-tauri/nexterm-agent-${{ matrix.rust_target }}
          chmod +x packages/clients/desktop/src-tauri/nexterm-agent-${{ matrix.rust_target }}

      - name: Place sidecar binaries (Windows)
        if: matrix.target_os == 'windows'
        run: |
          Copy-Item sea-artifacts/nexterm-hub-${{ matrix.target_os }}-${{ matrix.target_arch }}.exe `
            packages/clients/desktop/src-tauri/nexterm-hub-${{ matrix.rust_target }}.exe
          Copy-Item sea-artifacts/nexterm-agent-${{ matrix.target_os }}-${{ matrix.target_arch }}.exe `
            packages/clients/desktop/src-tauri/nexterm-agent-${{ matrix.rust_target }}.exe
        shell: pwsh

      - name: Build shared package
        run: pnpm -F @nexterm/shared build

      - name: Build web UI
        run: pnpm -F @nexterm/web build

      - name: Build Tauri app
        env:
          TAURI_CONFIG: '{"build":{"beforeBuildCommand":""}}'
        run: pnpm -F @nexterm/desktop exec tauri build

      - name: Upload Tauri installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.target_os }}-${{ matrix.target_arch }}
          path: |
            packages/clients/desktop/src-tauri/target/release/bundle/**/*.deb
            packages/clients/desktop/src-tauri/target/release/bundle/**/*.AppImage
            packages/clients/desktop/src-tauri/target/release/bundle/**/*.msi
            packages/clients/desktop/src-tauri/target/release/bundle/nsis/*.exe
            packages/clients/desktop/src-tauri/target/release/bundle/**/*.dmg
          retention-days: 7
