name: Build

on:
  workflow_call:

jobs:
  matrix:
    name: Load Build Matrix
    runs-on: ubuntu-latest
    outputs:
      agent: ${{ steps.filter.outputs.agent }}
      hub: ${{ steps.filter.outputs.hub }}
      desktop: ${{ steps.filter.outputs.desktop }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        run: |
          jq -c '{include:[.targets[]|select(.enabled and .agent)]}' \
            .github/build-matrix.json > /tmp/agent.json
          jq -c '{include:[.targets[]|select(.enabled and .hub)]}' \
            .github/build-matrix.json > /tmp/hub.json
          jq -c '{include:[.targets[]|select(.enabled and .desktop)]}' \
            .github/build-matrix.json > /tmp/desktop.json
          echo "agent=$(cat /tmp/agent.json)" >> "$GITHUB_OUTPUT"
          echo "hub=$(cat /tmp/hub.json)" >> "$GITHUB_OUTPUT"
          echo "desktop=$(cat /tmp/desktop.json)" >> "$GITHUB_OUTPUT"

  build-web:
    name: Build Web UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: ./scripts/build-web.sh
        env:
          NEXTERM_BUILD_HASH: ${{ github.sha }}
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist-raw
          path: packages/clients/web/dist/
          retention-days: 1
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist-embedded
          path: packages/hub/static/
          retention-days: 1

  build-agent:
    name: Build Agent (${{ matrix.triple }})
    needs: [matrix]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.agent) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test
      - name: Build (bash)
        if: matrix.shell_sh
        run: ./scripts/build-agent.sh
        env:
          NEXTERM_TARGET_TRIPLE: ${{ matrix.triple }}
      - name: Build (pwsh)
        if: ${{ !matrix.shell_sh }}
        shell: pwsh
        run: .\scripts\build-agent.ps1
        env:
          NEXTERM_TARGET_TRIPLE: ${{ matrix.triple }}
      - uses: actions/upload-artifact@v4
        with:
          name: agent-${{ matrix.triple }}
          path: dist/sea/nexterm-agent*
          retention-days: 7

  build-hub:
    name: Build Hub (${{ matrix.triple }})
    needs: [matrix, build-web]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.hub) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: web-dist-embedded
          path: packages/hub/static/
      - name: Build (bash)
        if: matrix.shell_sh
        run: ./scripts/build-hub.sh
        env:
          NEXTERM_SKIP_WEB: "true"
          NEXTERM_TARGET_TRIPLE: ${{ matrix.triple }}
          NEXTERM_BUILD_HASH: ${{ github.sha }}
      - name: Build (pwsh)
        if: ${{ !matrix.shell_sh }}
        shell: pwsh
        run: .\scripts\build-hub.ps1
        env:
          NEXTERM_SKIP_WEB: "true"
          NEXTERM_TARGET_TRIPLE: ${{ matrix.triple }}
          NEXTERM_BUILD_HASH: ${{ github.sha }}
      - uses: actions/upload-artifact@v4
        with:
          name: hub-${{ matrix.triple }}
          path: dist/sea/nexterm-hub*
          retention-days: 7

  build-desktop:
    name: Build Desktop (${{ matrix.triple }})
    needs: [matrix, build-agent, build-hub, build-web]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.desktop) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/clients/desktop/src-tauri
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: agent-${{ matrix.triple }}
          path: dist/sea/
      - uses: actions/download-artifact@v4
        with:
          name: hub-${{ matrix.triple }}
          path: dist/sea/
      - uses: actions/download-artifact@v4
        with:
          name: web-dist-raw
          path: packages/clients/web/dist/
      - name: Place sidecars + build (bash)
        if: matrix.shell_sh
        run: |
          TRIPLE="${{ matrix.triple }}"
          cp dist/sea/nexterm-agent "packages/clients/desktop/src-tauri/nexterm-agent-${TRIPLE}"
          cp dist/sea/nexterm-hub "packages/clients/desktop/src-tauri/nexterm-hub-${TRIPLE}"
          pnpm -F @nexterm/shared build
          pnpm -F @nexterm/desktop tauri build --config '{"build":{"beforeBuildCommand":""}}'
      - name: Place sidecars + build (pwsh)
        if: ${{ !matrix.shell_sh }}
        shell: pwsh
        run: |
          $triple = "${{ matrix.triple }}"
          Copy-Item dist\sea\nexterm-agent.exe "packages\clients\desktop\src-tauri\nexterm-agent-$triple.exe"
          Copy-Item dist\sea\nexterm-hub.exe "packages\clients\desktop\src-tauri\nexterm-hub-$triple.exe"
          pnpm -F @nexterm/shared build
          pnpm -F @nexterm/desktop tauri build --config '{\"build\":{\"beforeBuildCommand\":\"\"}}'
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.triple }}
          path: |
            packages/clients/desktop/src-tauri/target/release/bundle/**/*.msi
            packages/clients/desktop/src-tauri/target/release/bundle/nsis/*.exe
            packages/clients/desktop/src-tauri/target/release/bundle/**/*.dmg
            packages/clients/desktop/src-tauri/target/release/bundle/**/*.deb
          retention-days: 7
