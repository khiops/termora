name: Cleanup Caches

on:
  # Run after CI completes on main
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  # Manual trigger
  workflow_dispatch:

permissions:
  actions: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup old caches
        uses: actions/github-script@v7
        with:
          script: |
            const caches = await github.rest.actions.getActionsCacheList({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sort: 'created_at',
              direction: 'desc',
            });

            // Group caches by key prefix (before the hash suffix)
            const groups = new Map();
            for (const cache of caches.data.actions_caches) {
              const parts = cache.key.split('-');
              const prefix = parts.slice(0, -1).join('-');
              if (!groups.has(prefix)) groups.set(prefix, []);
              groups.get(prefix).push(cache);
            }

            let deleted = 0;
            for (const [prefix, entries] of groups) {
              // Sort by created_at desc, keep only the newest
              entries.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
              for (const old of entries.slice(1)) {
                core.info(`Deleting cache: ${old.key} (${(old.size_in_bytes / 1024 / 1024).toFixed(0)} MB)`);
                await github.rest.actions.deleteActionsCacheById({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  cache_id: old.id,
                });
                deleted++;
              }
            }
            core.info(`Cleaned up ${deleted} old cache(s). Kept 1 per group.`);
