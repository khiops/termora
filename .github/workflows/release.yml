name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.2.0)"
        required: true
  workflow_call:
    inputs:
      tag:
        description: "Release tag (e.g. v0.2.0)"
        required: true
        type: string
      ref:
        description: "Exact commit SHA to build (used when the tag does not exist yet, i.e. draft release)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  matrix:
    name: Load Build Matrix
    runs-on: ubuntu-latest
    outputs:
      agent: ${{ steps.filter.outputs.agent }}
      hub: ${{ steps.filter.outputs.hub }}
      desktop: ${{ steps.filter.outputs.desktop }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || inputs.tag || github.ref }}
      - id: filter
        run: |
          jq -c '{include:[.targets[]|select(.enabled and .agent)]}' \
            .github/build-matrix.json > /tmp/agent.json
          jq -c '{include:[.targets[]|select(.enabled and .hub)]}' \
            .github/build-matrix.json > /tmp/hub.json
          jq -c '{include:[.targets[]|select(.enabled and .desktop)]}' \
            .github/build-matrix.json > /tmp/desktop.json
          echo "agent=$(cat /tmp/agent.json)" >> "$GITHUB_OUTPUT"
          echo "hub=$(cat /tmp/hub.json)" >> "$GITHUB_OUTPUT"
          echo "desktop=$(cat /tmp/desktop.json)" >> "$GITHUB_OUTPUT"

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || inputs.tag || github.ref }}
          fetch-depth: 0
      - name: Create or reuse release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ inputs.tag || github.ref_name }}
        run: |
          # The build must match the tag: when the tag already exists
          # (force-tag-creation), refuse to attach assets built from a
          # different commit — GitHub ignores target_commitish once the
          # tag exists, so failing loudly is the only safe option.
          if TAG_SHA="$(git rev-parse -q --verify "refs/tags/$TAG_NAME^{commit}" 2>/dev/null)"; then
            HEAD_SHA="$(git rev-parse HEAD)"
            if [ "$TAG_SHA" != "$HEAD_SHA" ]; then
              echo "::error::Tag $TAG_NAME points at $TAG_SHA but this build checked out $HEAD_SHA"
              exit 1
            fi
          fi
          # --paginate: with >100 releases, a single page can miss the
          # tag's release and create a duplicate draft.
          RELEASES_JSON="$(gh api --paginate "repos/${{ github.repository }}/releases?per_page=100" | jq -s 'add')"
          PUBLISHED_ID="$(printf '%s' "$RELEASES_JSON" | jq -r --arg tag "$TAG_NAME" '[.[] | select(.tag_name == $tag and (.draft | not)) | .id][0] // empty')"
          if [ -n "$PUBLISHED_ID" ]; then
            echo "Release $TAG_NAME already exists (published); reusing id=$PUBLISHED_ID"
          else
            DRAFT_IDS="$(printf '%s' "$RELEASES_JSON" | jq -r --arg tag "$TAG_NAME" '.[] | select(.tag_name == $tag and .draft) | .id')"
            KEEP_DRAFT_ID=""
            for id in $DRAFT_IDS; do
              if [ -z "$KEEP_DRAFT_ID" ]; then
                KEEP_DRAFT_ID="$id"
                echo "Keeping draft release id=$id"
              else
                echo "Deleting duplicate draft release id=$id"
                gh api -X DELETE "repos/${{ github.repository }}/releases/$id"
              fi
            done
            if [ -n "$KEEP_DRAFT_ID" ]; then
              # Reuse release-please's draft as-is: it carries the curated
              # changelog body, and the tag-vs-HEAD guard above already
              # rules out building a commit the tag does not point at.
              echo "Reusing draft release $TAG_NAME id=$KEEP_DRAFT_ID"
            else
              gh release create "$TAG_NAME" --draft --generate-notes --title "$TAG_NAME" --target "$(git rev-parse HEAD)"
            fi
          fi

  build-web:
    name: Build Web UI
    needs: [create-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || inputs.tag || github.ref }}
      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm -F @termora/shared build
      - name: Build web
        run: |
          TERMORA_BUILD_HASH="$(git rev-parse HEAD)"
          export TERMORA_BUILD_HASH
          ./scripts/build-web.sh
      - name: Upload web assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ inputs.tag || github.ref_name }}
        run: |
          tar czf web-dist.tar.gz -C packages/clients/web/dist .
          tar czf web-embedded.tar.gz -C packages/hub/static .
          gh release upload "$TAG_NAME" --clobber web-dist.tar.gz web-embedded.tar.gz

  build-agent:
    name: Build Agent (${{ matrix.triple }})
    needs: [matrix, create-release]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.agent) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: ${{ matrix.triple }}
      - uses: Swatinem/rust-cache@v2
      - name: Install aarch64 cross-compile tools
        if: matrix.triple == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        if: matrix.shell_sh && matrix.triple != 'aarch64-unknown-linux-gnu'
        run: cargo test
      - name: Build (bash)
        if: matrix.shell_sh
        env:
          TERMORA_TARGET_TRIPLE: ${{ matrix.triple }}
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: ./scripts/build-agent.sh
      - name: Build (pwsh)
        if: ${{ !matrix.shell_sh }}
        shell: pwsh
        env:
          TERMORA_TARGET_TRIPLE: ${{ matrix.triple }}
        run: .\scripts\build-agent.ps1
      - name: Upload agent to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ inputs.tag || github.ref_name }}
          TRIPLE: ${{ matrix.triple }}
        run: |
          for f in dist/sea/termora-agent*; do
            ext="${f##*.}"
            if [ "$ext" = "$f" ]; then ext=""; else ext=".$ext"; fi
            base="termora-agent-${TRIPLE}${ext}"
            cp "$f" "$base"
            gh release upload "$TAG_NAME" --clobber "$base"
          done

  build-hub:
    name: Build Hub (${{ matrix.triple }})
    needs: [matrix, build-web]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.hub) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || inputs.tag || github.ref }}
      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm -F @termora/shared build
      - name: Download web-embedded from release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ inputs.tag || github.ref_name }}
        run: |
          mkdir -p _tmp
          gh release download "$TAG_NAME" --pattern web-embedded.tar.gz --dir _tmp
          mkdir -p packages/hub/static
          tar xzf _tmp/web-embedded.tar.gz -C packages/hub/static
      - name: Build (bash)
        if: matrix.shell_sh
        env:
          TERMORA_SKIP_WEB: "true"
          TERMORA_TARGET_TRIPLE: ${{ matrix.triple }}
        run: |
          TERMORA_BUILD_HASH="$(git rev-parse HEAD)"
          export TERMORA_BUILD_HASH
          ./scripts/build-hub.sh
      - name: Build (pwsh)
        if: ${{ !matrix.shell_sh }}
        shell: pwsh
        env:
          TERMORA_SKIP_WEB: "true"
          TERMORA_TARGET_TRIPLE: ${{ matrix.triple }}
        run: |
          $env:TERMORA_BUILD_HASH = (git rev-parse HEAD)
          .\scripts\build-hub.ps1
      - name: Upload hub to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ inputs.tag || github.ref_name }}
          TRIPLE: ${{ matrix.triple }}
        run: |
          for f in dist/sea/termora-hub*; do
            ext="${f##*.}"
            if [ "$ext" = "$f" ]; then ext=""; else ext=".$ext"; fi
            base="termora-hub-${TRIPLE}${ext}"
            cp "$f" "$base"
            gh release upload "$TAG_NAME" --clobber "$base"
          done

  build-desktop:
    name: Build Desktop (${{ matrix.triple }})
    needs: [matrix, build-agent, build-hub, build-web]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.desktop) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || inputs.tag || github.ref }}
      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/clients/desktop/src-tauri
      - run: pnpm install --frozen-lockfile
      - run: pnpm -F @termora/shared build
      - name: Align desktop versions with release tag
        shell: bash
        env:
          TAG_NAME: ${{ inputs.tag || github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          CONF="packages/clients/desktop/src-tauri/tauri.conf.json"
          CARGO="packages/clients/desktop/src-tauri/Cargo.toml"
          jq --arg v "$VERSION" '.version = $v' "$CONF" > "${CONF}.tmp" && mv "${CONF}.tmp" "$CONF"
          sed -i "0,/^version = .*/s//version = \"$VERSION\"/" "$CARGO"
          echo "Set desktop versions to $VERSION"
      - name: Download assets from release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ inputs.tag || github.ref_name }}
          TRIPLE: ${{ matrix.triple }}
        run: |
          mkdir -p _tmp dist/sea
          gh release download "$TAG_NAME" --pattern "termora-agent-${TRIPLE}*" --dir dist/sea/
          gh release download "$TAG_NAME" --pattern "termora-hub-${TRIPLE}*" --dir dist/sea/
          gh release download "$TAG_NAME" --pattern web-dist.tar.gz --dir _tmp
          mkdir -p packages/clients/web/dist
          tar xzf _tmp/web-dist.tar.gz -C packages/clients/web/dist
      - name: Place sidecars + build (bash)
        if: matrix.shell_sh
        run: |
          TRIPLE="${{ matrix.triple }}"
          cp dist/sea/termora-agent-${TRIPLE} "packages/clients/desktop/src-tauri/termora-agent-${TRIPLE}"
          cp dist/sea/termora-hub-${TRIPLE} "packages/clients/desktop/src-tauri/termora-hub-${TRIPLE}"
          pnpm -F @termora/desktop tauri build --config '{"build":{"beforeBuildCommand":""}}'
      - name: Place sidecars + build (pwsh)
        if: ${{ !matrix.shell_sh }}
        shell: pwsh
        env:
          TRIPLE: ${{ matrix.triple }}
        run: |
          Copy-Item "dist\sea\termora-agent-${env:TRIPLE}.exe" "packages\clients\desktop\src-tauri\termora-agent-${env:TRIPLE}.exe"
          Copy-Item "dist\sea\termora-hub-${env:TRIPLE}.exe" "packages\clients\desktop\src-tauri\termora-hub-${env:TRIPLE}.exe"
          pnpm -F @termora/desktop tauri build --config '{\"build\":{\"beforeBuildCommand\":\"\"}}'
      - name: Upload desktop installers to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ inputs.tag || github.ref_name }}
        run: |
          find packages/clients/desktop/src-tauri/target/release/bundle -type f \
            \( -name "*.msi" -o -name "*.exe" -o -name "*.dmg" -o -name "*.deb" \) \
            -exec gh release upload "$TAG_NAME" --clobber {} \;

  publish-release:
    name: Publish Release
    needs: [build-agent, build-hub, build-desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || inputs.tag || github.ref }}
      - name: Remove intermediate assets and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ inputs.tag || github.ref_name }}
        run: |
          echo "Publishing release: $TAG_NAME"
          gh release delete-asset "$TAG_NAME" web-dist.tar.gz --yes || true
          gh release delete-asset "$TAG_NAME" web-embedded.tar.gz --yes || true
          gh release edit "$TAG_NAME" --draft=false
          IS_DRAFT=$(gh release view "$TAG_NAME" --json isDraft -q '.isDraft')
          echo "Release $TAG_NAME draft=$IS_DRAFT"
          if [ "$IS_DRAFT" = "true" ]; then
            echo "::error::Release $TAG_NAME is still draft after edit!"
            exit 1
          fi
