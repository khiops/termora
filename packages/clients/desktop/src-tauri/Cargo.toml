[package]
name = "nexterm-desktop"
version = "0.1.0"
description = "Nexterm desktop app (Tauri v2)"
authors = ["Nexterm contributors"]
license = "MIT"
repository = "https://github.com/khiops/nexterm"
edition = "2021"
rust-version = "1.77.2"

[lib]
name = "nexterm_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon", "devtools"] }
tauri-plugin-shell = "2"
tauri-plugin-updater = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
reqwest = { version = "0.12", features = ["blocking"], default-features = false }
dirs = "6"

[profile.release]
# Keep lto = false (Cargo default) for fast CI builds.
# Strip debug symbols — smaller binary.
strip = true
