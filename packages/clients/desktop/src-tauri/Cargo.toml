[package]
name = "nexterm-desktop"
version = "0.1.0"
description = "Nexterm desktop app (Tauri v2)"
authors = ["Nexterm contributors"]
license = "MIT"
repository = "https://github.com/nexterm/nexterm"
edition = "2021"
rust-version = "1.77.2"

[lib]
name = "nexterm_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon"] }
tauri-plugin-shell = "2"
tauri-plugin-updater = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
reqwest = { version = "0.12", features = ["blocking"], default-features = false }
dirs = "6"

[profile.release]
# Thin LTO: ~90% of fat LTO quality, much faster linking
lto = "thin"
# Strip debug symbols — smaller binary, faster link
strip = true
# Default codegen-units (16) for faster parallel compilation
# codegen-units = 1 would be smaller but 3-4x slower to compile
