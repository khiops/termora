# cargo-deny configuration for the desktop (Tauri) dependency tree (#78).
# Separate from the root deny.toml on purpose: the AGPL-3.0-only application can
# depend on weak-copyleft licenses (MPL-2.0) that the MIT OR Apache-2.0 libraries
# in the root workspace must not pull in.
# Run: cargo deny --manifest-path packages/clients/desktop/src-tauri/Cargo.toml check licenses

[licenses]
version = 2
allow = [
	"MIT",
	"Apache-2.0",
	"Apache-2.0 WITH LLVM-exception",
	"ISC",
	"BSD-2-Clause",
	"BSD-3-Clause",
	"Unicode-3.0",
	"Zlib",
	"MPL-2.0",
	"CDLA-Permissive-2.0",
]
exceptions = [
	# Our own application crate — AGPL by decision (#78).
	{ name = "termora-desktop", allow = ["AGPL-3.0-only"] },
]
