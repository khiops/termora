# cargo-deny configuration — dependency license compatibility gate (#78).
# Scope: the root cargo workspace (crates/*). Run: cargo deny check licenses

[licenses]
version = 2
# Permissive licenses acceptable for dependencies of the AGPL-3.0-only
# termora-agent crate (async-xpty extracted to its own repo, #87).
allow = [
	"MIT",
	"Apache-2.0",
	"BSD-2-Clause",
	"Unicode-3.0",
]
exceptions = [
	# Our own application crate — AGPL by decision (#78), never a dependency of the libs.
	{ name = "termora-agent", allow = ["AGPL-3.0-only"] },
]
